<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回复分析人设定制</title>
<style>
:root{
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --text2:#86868b;
  --text3:#aeaeb2;
  --card:rgba(255,255,255,0.72);
  --card-border:rgba(255,255,255,0.8);
  --card-shadow:0 8px 40px rgba(0,0,0,0.06);
  --accent:#0071e3;
  --accent-light:rgba(0,113,227,0.08);
  --gradient1:linear-gradient(135deg,#0071e3,#5856d6);
  --divider:rgba(0,0,0,0.06);
  --input-bg:rgba(0,0,0,0.04);
  --input-border:rgba(0,0,0,0.1);
  --success:#34c759;
  --success-bg:rgba(52,199,89,0.08);
  --success-hover:rgba(52,199,89,0.15);
  --info:#0071e3;
  --info-bg:rgba(0,113,227,0.08);
}
html[data-theme="dark"]{
  --bg:#000;
  --text:#f5f5f7;
  --text2:#86868b;
  --text3:#48484a;
  --card:rgba(28,28,30,0.78);
  --card-border:rgba(255,255,255,0.06);
  --card-shadow:0 8px 40px rgba(0,0,0,0.4);
  --accent:#2997ff;
  --accent-light:rgba(41,151,255,0.12);
  --gradient1:linear-gradient(135deg,#2997ff,#5e5ce6);
  --divider:rgba(255,255,255,0.06);
  --input-bg:rgba(255,255,255,0.06);
  --input-border:rgba(255,255,255,0.1);
  --success:#30d158;
  --success-bg:rgba(48,209,88,0.12);
  --success-hover:rgba(48,209,88,0.2);
  --info:#2997ff;
  --info-bg:rgba(41,151,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .4s,color .4s;
  padding-bottom:40px;
}
.bg-glow{
  position:fixed;
  top:-20%;
  left:-10%;
  width:60%;
  height:60%;
  background:radial-gradient(ellipse,rgba(0,113,227,0.05) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}
html[data-theme="dark"] .bg-glow{
  background:radial-gradient(ellipse,rgba(41,151,255,0.06) 0%,transparent 70%);
}
.container{
  max-width:800px;
  margin:0 auto;
  padding:0 24px;
  position:relative;
  z-index:1;
}
header{
  padding:50px 0 20px;
  text-align:center;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) forwards;
}
header .badge{
  display:inline-block;
  font-size:12px;
  font-weight:600;
  letter-spacing:.05em;
  color:var(--info);
  background:var(--info-bg);
  padding:4px 14px;
  border-radius:20px;
  margin-bottom:16px;
  text-transform:uppercase;
}
header h1{
  font-size:clamp(28px,4vw,44px);
  font-weight:700;
  letter-spacing:-.025em;
  line-height:1.2;
  background:var(--gradient1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
header .sub{
  font-size:16px;
  color:var(--text2);
}
.config-card{
  margin-top:20px;
  padding:32px;
  background:var(--card);
  backdrop-filter:blur(32px) saturate(140%);
  -webkit-backdrop-filter:blur(32px) saturate(140%);
  border:1px solid var(--card-border);
  border-radius:24px;
  box-shadow:var(--card-shadow);
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp .8s .15s cubic-bezier(.22,1,.36,1) forwards;
}
.form-group{
  margin-bottom:24px;
}
.form-group label{
  display:block;
  font-size:14px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
}
select.select-input{
  width:100%;
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--input-border);
  background:var(--input-bg);
  color:var(--text);
  font-size:15px;
  font-family:inherit;
  outline:none;
  transition:all .25s;
  cursor:pointer;
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
  background-repeat:no-repeat;
  background-position:right 14px center;
  background-size:16px;
  padding-right:40px;
}
select.select-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
.textarea-wrapper{
  position:relative;
}
textarea.textarea-input{
  width:100%;
  min-height:220px;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--input-border);
  background:var(--input-bg);
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  line-height:1.6;
  outline:none;
  transition:all .25s;
  resize:vertical;
}
textarea.textarea-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
.hint-text{
  font-size:12px;
  color:var(--text2);
  margin-top:6px;
  line-height:1.5;
}
.btn-row{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:32px;
  border-top:1px solid var(--divider);
  padding-top:24px;
}
.btn{
  padding:12px 24px;
  border:none;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s;
  font-family:inherit;
  outline:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-secondary{
  background:var(--input-bg);
  color:var(--text);
}
.btn-secondary:hover{
  background:var(--divider);
}
.btn-primary{
  background:var(--success-bg);
  color:var(--success);
}
.btn-primary:hover{
  background:var(--success-hover);
  transform:translateY(-1px);
}
.btn:disabled{
  opacity:.4;
  cursor:not-allowed;
  transform:none !important;
}
.status-banner{
  padding:14px 16px;
  border-radius:12px;
  font-size:13px;
  line-height:1.5;
  margin-bottom:24px;
  display:none;
  align-items:flex-start;
  gap:10px;
}
.status-banner.show{
  display:flex;
}
.status-banner-info{
  background:var(--info-bg);
  color:var(--info);
  border:1px solid rgba(0,113,227,0.15);
}
.toast{
  position:fixed;
  bottom:32px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--card-border);
  border-radius:12px;
  padding:10px 20px;
  font-size:13px;
  font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
  opacity:0;
  transition:all .35s;
  z-index:300;
  pointer-events:none;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
  <header>
    <div class="badge">Persona Optimization</div>
    <h1>回复分析人设定制</h1>
    <div class="sub">针对不同人格设定专属于回复分析（与主动分析）的人设提示词</div>
  </header>

  <div class="config-card">
    <div class="status-banner status-banner-info show" id="statusBanner">
      <span>ℹ️</span>
      <div>回复分析时使用完整人设可能会带入许多无关的系统规则。在此处为特定人格设置<b>简化的专属提示词</b>，分析时将优先使用此处配置。留空则默认降级为该人格的完整系统提示词。</div>
    </div>

    <div class="form-group">
      <label for="personaSelect">选择人格角色</label>
      <select class="select-input" id="personaSelect" onchange="onPersonaChange()">
        <option value="">正在加载人格列表...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="personaPrompt">专属回复分析人设提示词</label>
      <div class="textarea-wrapper">
        <textarea class="textarea-input" id="personaPrompt" placeholder="例如：天童爱丽丝，一个可爱的AI机器人，喜欢打游戏，说话带‘!级’。"></textarea>
      </div>
      <div class="hint-text">填写一到两句话的简化版人格描述即可，帮助回复/主动参与判定大模型以最轻量级的 Context 维持人设立场。</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="btnReset" onclick="resetPrompt()">重置</button>
      <button class="btn btn-primary" id="btnSave" onclick="savePrompt()">💾 保存配置</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
const B = window.AstrBotPluginPage;
if (!B) {
  document.body.innerHTML = '<div class="container"><div class="empty-state" style="text-align:center;padding:80px 20px;color:var(--text2);font-size:16px;"><div>⚠️</div><div style="margin-top:16px;">Bridge not available</div></div></div>';
} else {
  await B.ready();
  (function(){const m=window.matchMedia('(prefers-color-scheme:dark)');function s(d){document.documentElement.setAttribute('data-theme',d?'dark':'light')}s(m.matches);m.addEventListener('change',e=>s(e.matches))})();

  const personaSelect = document.getElementById('personaSelect');
  const personaPrompt = document.getElementById('personaPrompt');
  const btnSave = document.getElementById('btnSave');
  const btnReset = document.getElementById('btnReset');
  const toast = document.getElementById('toast');

  let personas = [];
  let personaPrompts = []; // Array of {persona_name, custom_persona_prompt}
  let currentPersonaName = '';

  let toastTimer = null;
  function showToast(msg, dur = 2500) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
  }

  async function loadData() {
    try {
      btnSave.disabled = true;
      btnReset.disabled = true;

      // 1. Fetch system personas
      const personasRes = await B.apiGet('personas');
      personas = personasRes.data || personasRes || [];

      // 2. Fetch current custom prompts list
      const promptsRes = await B.apiGet('persona_prompts');
      personaPrompts = promptsRes.data || promptsRes || [];

      // Render options
      personaSelect.innerHTML = '';
      if (personas.length === 0) {
        personaSelect.innerHTML = '<option value="">未找到系统人格角色</option>';
        return;
      }

      personas.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id || p.name;
        opt.textContent = `${p.name} (${p.id})`;
        personaSelect.appendChild(opt);
      });

      btnSave.disabled = false;
      btnReset.disabled = false;

      // Select first
      onPersonaChange();
    } catch (e) {
      console.error(e);
      showToast('获取数据失败: ' + e.message);
    }
  }

  window.onPersonaChange = function() {
    const selectedVal = personaSelect.value;
    currentPersonaName = selectedVal;
    if (!selectedVal) {
      personaPrompt.value = '';
      return;
    }

    // Find custom prompt
    const found = personaPrompts.find(item => item.persona_name.toLowerCase() === selectedVal.toLowerCase());
    if (found) {
      personaPrompt.value = found.custom_persona_prompt || '';
    } else {
      personaPrompt.value = '';
    }
  };

  window.resetPrompt = function() {
    personaPrompt.value = '';
  };

  window.savePrompt = async function() {
    if (!currentPersonaName) {
      showToast('请选择有效的角色人设');
      return;
    }

    const val = personaPrompt.value;
    btnSave.disabled = true;
    btnSave.textContent = '保存中...';

    try {
      const res = await B.apiPost('persona_prompts', {
        persona_name: currentPersonaName,
        custom_persona_prompt: val
      });

      if (res && res.status === 'ok') {
        // Refresh local cache list
        const idx = personaPrompts.findIndex(item => item.persona_name.toLowerCase() === currentPersonaName.toLowerCase());
        if (idx !== -1) {
          if (val.trim() === '') {
            personaPrompts.splice(idx, 1);
          } else {
            personaPrompts[idx].custom_persona_prompt = val;
          }
        } else if (val.trim() !== '') {
          personaPrompts.push({
            persona_name: currentPersonaName,
            custom_persona_prompt: val
          });
        }
        showToast('保存成功');
      } else {
        showToast('保存失败: ' + (res.message || '未知错误'));
      }
    } catch (e) {
      showToast('保存异常: ' + e.message);
    } finally {
      btnSave.disabled = false;
      btnSave.textContent = '💾 保存配置';
    }
  };

  // Run
  loadData();
}
</script>
</body>
</html>
